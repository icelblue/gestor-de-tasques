<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:20 7% 5%;--fg:40 25% 88%;--surface:40 7% 10%;--surface2:40 4% 13%;--surface3:40 4% 17%;
--border:40 7% 21%;--border2:40 5% 27%;--primary:38 60% 55%;--primary-fg:20 7% 5%;
--accent2:38 60% 46%;--text-faint:35 8% 31%;--muted-fg:35 10% 50%;
--done:140 25% 39%;--done-bg:150 28% 14%;--urgent:0 56% 52%;--urgent-bg:0 28% 14%;
--warning:28 60% 49%;--warning-bg:28 30% 12%;--info:207 35% 47%;--info-bg:210 30% 15%;
--destructive:0 60% 52%;--modal-bg:20 10% 4%/0.92;--drag-over:40 5% 15%;
--font-title:'Bebas Neue',sans-serif;--font-mono:'IBM Plex Mono',monospace;--font-body:'IBM Plex Sans',sans-serif;
}
body{font-family:var(--font-body);font-size:14px;min-height:100vh;overflow-x:hidden;background:hsl(var(--bg));color:hsl(var(--fg))}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:hsl(var(--bg))}::-webkit-scrollbar-thumb{background:hsl(var(--border2));border-radius:10px}
@keyframes pulse-urgent{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes modal-in{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}
.font-title{font-family:var(--font-title)}
.font-mono{font-family:var(--font-mono)}
.font-body{font-family:var(--font-body)}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
input,select,textarea{font:inherit;color:inherit}
a{color:inherit;text-decoration:none}
/* HELP MODAL — rich style */
.help-section{display:flex;flex-direction:column;gap:10px;margin-bottom:4px}
.help-section h3{font-family:var(--font-title);font-size:18px;letter-spacing:2px;color:hsl(var(--primary));margin-bottom:4px}
.shortcut-grid{display:grid;grid-template-columns:auto 1fr;gap:6px 16px;align-items:center}
.shortcut-key{font-family:var(--font-mono);font-size:11px;background:hsl(var(--surface3));border:1px solid hsl(var(--border2));border-radius:3px;padding:2px 8px;color:hsl(var(--fg));white-space:nowrap;justify-self:start}
.shortcut-desc{font-size:13px;color:hsl(var(--muted-fg))}
.help-tip{background:hsl(var(--surface2));border-left:3px solid hsl(var(--primary));padding:10px 14px;font-size:12px;color:hsl(var(--muted-fg));line-height:1.65;border-radius:0 3px 3px 0}
.help-tip strong{color:hsl(var(--fg))}
.help-tip code{font-family:var(--font-mono);background:hsl(var(--surface3));padding:1px 6px;border-radius:2px;color:hsl(var(--primary));font-size:11px}
.help-sep{height:1px;background:hsl(var(--border));margin:4px 0}
</style>
</head>

if(dr){const dmy=dr.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);const ymd=dr.match(/^(\d{4})-(\d{2})-(\d{2})$/);

function generateRecDates(baseDate,config){

const max=config.endType==='count'?config.count:200;
const end=config.endType==='date'&&config.endDate?new Date(config.endDate+'T23:59:59'):null;
const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
if(config.frequency==='daily'){for(let i=1;dates.length<max&&i<365;i++){const d=new Date(base);d.setDate(d.getDate()+i);if(end&&d>end)break;dates.push(fmt(d))}}
else if(config.frequency==='weekly'||config.frequency==='biweekly'){
const interval=config.frequency==='biweekly'?14:7;
if(config.days.length===0){for(let i=1;dates.length<max&&i<52;i++){const d=new Date(base);d.setDate(d.getDate()+i*interval);if(end&&d>end)break;dates.push(fmt(d))}}

for(let w=0;dates.length<max&&w<52;w++){for(const day of config.days.sort((a,b)=>a-b)){const d=new Date(ws);d.setDate(d.getDate()+day);if(d<=base)continue;if(end&&d>end)break;if(dates.length>=max)break;dates.push(fmt(d))}ws.setDate(ws.getDate()+interval)}}

function insertAtNotesCursor(char){

function downloadNotesCSV(){
const lines=notesText.split('\n').filter(l=>l.trim()&&!l.trim().startsWith('#'));
const BOM='\uFEFF';const header=['Nom','Prioritat','Data','Etiqueta'].join(';');
const rows=lines.map(line=>{if(line.includes('|')){const parts=line.split('|').map(p=>'"'+p.trim().replace(/"/g,'""')+'"');while(parts.length<4)parts.push('""');return parts.slice(0,4).join(';')}return'"'+line.trim().replace(/"/g,'""')+'";;;'});

else{const fileLabel=h('label',{style:{border:'2px dashed hsl(var(--border2))',borderRadius:'4px',padding:'28px',textAlign:'center',fontFamily:'var(--font-mono)',fontSize:'12px',color:'hsl(var(--muted-fg))',cursor:'pointer',display:'block'}},h('div',{style:{fontSize:'24px',marginBottom:'8px'}},'📄'),T.dropMain,' ',h('div',{style:{fontSize:'10px',color:'hsl(var(--text-faint))',marginTop:'4px'}},T.dropSub));

fi.addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{preview=parseTxt(ev.target.result);step=2;renderStep()};r.readAsText(f,'UTF-8')});
fileLabel.appendChild(fi);bodyContainer.appendChild(fileLabel)}
footerContainer.appendChild(btnSecondary(T.impCancel,()=>{showModal=null;render()}))}
else{
const valid=preview.filter(p=>!p.error),errs=preview.filter(p=>p.error);
bodyContainer.appendChild(h('p',{style:{fontFamily:'var(--font-mono)',fontSize:'10px',letterSpacing:'2px',color:'hsl(var(--text-faint))',textTransform:'uppercase'}},valid.length+' vàlides'+(errs.length?' · '+errs.length+' errors':'')));
const list=h('div',{style:{display:'flex',flexDirection:'column',gap:'4px',maxHeight:'220px',overflowY:'auto'}});
preview.forEach(p=>{list.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'8px',background:'hsl(var(--surface2))',border:'1px solid '+(p.error?'hsl(var(--destructive))':'hsl(var(--border))'),borderRadius:'2px',padding:'6px 12px',fontSize:'14px',opacity:p.error?'.7':'1'}},
h('span',{style:{flex:'1',fontWeight:'600'}},p.name),h('span',{style:{fontFamily:'var(--font-mono)',fontSize:'9px',color:'hsl(var(--text-faint))',display:'flex',gap:'8px'}},h('span',{style:{color:priColors[p.priority]}},T.priShort[p.priority]),p.date?h('span',{},fmtDate(p.date)):null,p.tag?h('span',{},p.tag):null)))});
bodyContainer.appendChild(list);
bodyContainer.appendChild(h('div',{style:{background:'hsl(var(--surface2))',borderLeft:'3px solid hsl(var(--primary))',padding:'8px 12px',fontSize:'12px',color:'hsl(var(--muted-fg))',borderRadius:'0 2px 2px 0'}},T.impTip));
footerContainer.appendChild(btnSecondary(T.impBack,()=>{step=1;renderStep()}));
if(valid.length>0)footerContainer.appendChild(btnPrimary(T.impConfirm,()=>{
const start=tasks.length;valid.forEach((p,i)=>tasks.push({id:uid(),name:p.name,priority:p.priority,date:p.date,status:'pendent',tag:p.tag||'',notes:'',images:[],order:start+i}));
save();showModal=null;showToastMsg('✓ '+valid.length+' importades','success');render()}));
footerContainer.appendChild(btnSecondary(T.impCancel,()=>{showModal=null;render()}))}
}
renderStep();return overlay}

/* ─── Report Modal ─── */
function renderReportModal(){
const T=t();const now=new Date();let selectedMonth=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
const overlay=h('div',{style:modalOverlay()});
overlay.addEventListener('click',e=>{if(e.target===overlay){showModal=null;render()}});
const box=h('div',{style:modalBox('560px')});box.addEventListener('click',e=>e.stopPropagation());
box.appendChild(modalHeader(T.reportTitle));
const content=h('div',{style:{flex:'1',overflowY:'auto'}});box.appendChild(content);
overlay.appendChild(box);

function renderReportContent(){content.innerHTML='';
// Months that actually have tasks (sorted desc)
const monthSet=new Set(tasks.filter(tk=>tk.date).map(tk=>tk.date.slice(0,7)));
const months=Array.from(monthSet).sort().reverse();
if(months.length===0){content.appendChild(h('div',{style:{textAlign:'center',padding:'48px 20px',color:'hsl(var(--muted-fg))',fontFamily:'var(--font-mono)',fontSize:'12px'}},T.reportEmpty));return}
if(!months.includes(selectedMonth))selectedMonth=months[0];
const msel=h('div',{style:{display:'flex',gap:'4px',padding:'12px 20px',flexWrap:'wrap',borderBottom:'1px solid hsl(var(--border))'}});
months.forEach(ym=>{const btn=h('button',{style:{fontFamily:'var(--font-mono)',fontSize:'10px',letterSpacing:'1px',padding:'4px 10px',borderRadius:'2px',border:'1px solid '+(selectedMonth===ym?'hsl(var(--primary))':'hsl(var(--border))'),background:selectedMonth===ym?'hsl(var(--primary))':'transparent',color:selectedMonth===ym?'hsl(var(--primary-fg))':'hsl(var(--muted-fg))'}},
new Date(Number(ym.split('-')[0]),Number(ym.split('-')[1])-1).toLocaleDateString(lang==='ca'?'ca':lang==='es'?'es':'en',{month:'short',year:'numeric'}));
btn.addEventListener('click',()=>{selectedMonth=ym;renderReportContent()});msel.appendChild(btn)});
content.appendChild(msel);
const monthTasks=tasks.filter(tk=>tk.date&&tk.date.startsWith(selectedMonth)).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
const done=monthTasks.filter(tk=>tk.status==='feta'),pending=monthTasks.filter(tk=>tk.status!=='feta');
// Stats
content.appendChild(h('div',{style:{display:'flex',gap:'16px',padding:'12px 20px',fontFamily:'var(--font-mono)',fontSize:'12px',color:'hsl(var(--muted-fg))',borderBottom:'1px solid hsl(var(--border))'}},
h('span',{},T.statTotal+': ',h('strong',{style:{color:'hsl(var(--fg))'}},String(monthTasks.length))),
h('span',{},T.fDone+': ',h('strong',{style:{color:'hsl(var(--done))'}},String(done.length))),
h('span',{},T.fPending+': ',h('strong',{style:{color:'hsl(var(--warning))'}},String(pending.length)))));
// List
const list=h('div',{style:{padding:'12px 20px',maxHeight:'300px',overflowY:'auto'}});
if(monthTasks.length===0)list.appendChild(h('div',{style:{textAlign:'center',padding:'32px 0',color:'hsl(var(--muted-fg))',fontFamily:'var(--font-mono)',fontSize:'12px'}},T.reportEmpty));
else monthTasks.forEach(tk=>{list.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'6px 8px',borderRadius:'2px',fontSize:'12px',fontFamily:'var(--font-mono)',opacity:tk.status==='feta'?'.6':'1'}},
h('span',{style:{color:tk.status==='feta'?'hsl(var(--done))':'hsl(var(--muted-fg))'}},tk.status==='feta'?'✓':'○'),
h('span',{style:{flex:'1',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textDecoration:tk.status==='feta'?'line-through':'none',color:tk.status==='feta'?'hsl(var(--muted-fg))':'hsl(var(--fg))'}},tk.name),
tk.date?h('span',{style:{color:'hsl(var(--text-faint))',fontSize:'9px'}},fmtDate(tk.date)):null,
...((tk.tag||'').split(';').map(s=>s.trim()).filter(Boolean).map(tg=>h('span',{style:{...tagColorStyle(tg),fontSize:'8px',letterSpacing:'1px',padding:'1px 6px',borderRadius:'10px',textTransform:'uppercase',fontWeight:'600'}},tg)))
))});
content.appendChild(list);
// Actions
const actions=h('div',{style:{display:'flex',gap:'8px',padding:'12px 20px',borderTop:'1px solid hsl(var(--border))'}});
actions.appendChild(h('button',{onClick:()=>{
const[y,m]=selectedMonth.split('-');const mn=new Date(Number(y),Number(m)-1).toLocaleDateString(lang==='ca'?'ca':lang==='es'?'es':'en',{month:'long',year:'numeric'});
let report='📋 '+T.reportTitle+' — '+mn.toUpperCase()+'\n'+'═'.repeat(44)+'\n\n';
report+='📊 '+T.statTotal.toUpperCase()+': '+monthTasks.length+'  ·  ✅ '+T.fDone+': '+done.length+'  ·  ⏳ '+T.fPending+': '+pending.length+'\n\n';
if(pending.length){report+='⏳ '+T.fPending.toUpperCase()+' ('+pending.length+')\n'+'─'.repeat(30)+'\n';pending.forEach(tk=>{report+='  ○ ['+T.priShort[tk.priority]+'] '+tk.name;if(tk.date)report+='  📅 '+fmtDate(tk.date);if(tk.tag)report+='  🏷 '+tk.tag;report+='\n'});report+='\n'}
if(done.length){report+='✅ '+T.fDone.toUpperCase()+' ('+done.length+')\n'+'─'.repeat(30)+'\n';done.forEach(tk=>{report+='  ✓ '+tk.name;if(tk.date)report+='  📅 '+fmtDate(tk.date);if(tk.tag)report+='  🏷 '+tk.tag;report+='\n'});report+='\n'}
report+='─'.repeat(44)+'\nGT · '+T.appTitle+'\n';
if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(report).then(()=>showToastMsg('📋 ✓','success')).catch(()=>{const ta=document.createElement('textarea');ta.value=report;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');showToastMsg('📋 ✓','success')}catch{showToastMsg('✗','error')}document.body.removeChild(ta)})}
else{const ta=document.createElement('textarea');ta.value=report;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');showToastMsg('📋 ✓','success')}catch{}document.body.removeChild(ta)}},
style:{flex:'1',background:'hsl(var(--surface2))',border:'1px solid hsl(var(--border))',color:'hsl(var(--muted-fg))',padding:'8px 12px',borderRadius:'2px',fontFamily:'var(--font-mono)',fontSize:'12px',letterSpacing:'1px'}},'📋 '+T.reportCopy));
actions.appendChild(h('button',{onClick:()=>{const BOM='\uFEFF';const header=[T.lblName,T.lblPriority,T.lblDate,T.lblStatus,T.lblTag].join(';');
const rows=monthTasks.map(tk=>'"'+tk.name.replace(/"/g,'""')+'"'+';'+T.priName[tk.priority]+';'+(tk.date?fmtDate(tk.date):'')+';'+(tk.status==='feta'?T.statusFeta:T.statusPendent)+';'+(tk.tag||''));
const csv=BOM+[header,...rows].join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='report-'+selectedMonth+'.csv';a.click()},
style:{flex:'1',background:'hsl(var(--surface2))',border:'1px solid hsl(var(--border))',color:'hsl(var(--muted-fg))',padding:'8px 12px',borderRadius:'2px',fontFamily:'var(--font-mono)',fontSize:'12px',letterSpacing:'1px'}},T.reportDownload));
content.appendChild(actions)}
renderReportContent();return overlay}

/* ─── Init ─── */
if(!window._calCursor)window._calCursor=new Date();
init();
</script>
