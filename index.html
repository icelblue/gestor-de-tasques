<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GT · Gestor de Tasques</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='10' fill='%230f0f0e'/><text y='48' x='5' font-size='50' font-family='Georgia,serif' font-weight='bold' fill='%23d4a843'>GT</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f0e;--surface:#1a1a18;--surface2:#232320;--surface3:#2d2d29;--border:#3a3a35;--border2:#4a4a44;--text:#e8e4d8;--text-muted:#8a8578;--text-faint:#555248;--accent:#d4a843;--accent2:#b8922e;--done:#4a7c59;--done-bg:#1a2e21;--urgent:#c94040;--urgent-bg:#2e1a1a;--warning:#c97d30;--warning-bg:#2e2010;--info:#4a7ca8;--info-bg:#1a2535;--drag-over:#2a2a25;--modal-bg:rgba(10,10,9,0.92);--radius:3px;--font-title:'Bebas Neue',sans-serif;--font-mono:'IBM Plex Mono',monospace;--font-body:'IBM Plex Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;min-height:100vh;overflow-x:hidden}

/* LANG BAR */
#lang-bar{display:flex;align-items:center;justify-content:flex-end;gap:6px;padding:5px 28px;background:var(--surface);border-bottom:1px solid var(--border)}
.lang-btn{background:none;border:1px solid var(--border);color:var(--text-faint);padding:3px 12px;font-family:var(--font-mono);font-size:10px;letter-spacing:1px;border-radius:var(--radius);cursor:pointer;transition:all .15s}
.lang-btn:hover{border-color:var(--accent);color:var(--accent)}
.lang-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}

/* BANNER */
#ls-banner{background:var(--info-bg);border-bottom:1px solid var(--info);padding:8px 24px;display:flex;align-items:center;gap:12px;font-family:var(--font-mono);font-size:11px;color:#7ab4d8;flex-wrap:wrap}
#ls-banner strong{color:var(--text)}
#ls-banner a{color:var(--accent);cursor:pointer;text-decoration:underline}
.banner-actions{display:flex;gap:8px;margin-left:auto;flex-shrink:0}
.banner-btn{background:none;border:1px solid var(--info);color:#7ab4d8;padding:3px 10px;font-family:var(--font-mono);font-size:10px;border-radius:var(--radius);cursor:pointer;transition:all .15s;white-space:nowrap}
.banner-btn:hover{border-color:var(--accent);color:var(--accent)}
.banner-close{background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:16px;padding:0 4px;transition:color .15s}
.banner-close:hover{color:var(--text)}

/* HEADER */
#header{display:flex;align-items:center;justify-content:space-between;padding:18px 28px 14px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;gap:14px;flex-wrap:wrap}
#header h1{font-family:var(--font-title);font-size:36px;letter-spacing:6px;color:var(--accent);line-height:1}
#header .subtitle{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);letter-spacing:2px;margin-top:2px}
#stats{display:flex;gap:18px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
#stats span{display:flex;flex-direction:column;align-items:center;gap:1px}
#stats .num{font-size:22px;font-weight:600;color:var(--text);line-height:1}
#stats .num.urgent{color:var(--urgent)}
#stats .num.done-c{color:var(--done)}
#header-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
#btn-new{background:var(--accent);color:var(--bg);border:none;padding:10px 22px;font-family:var(--font-title);font-size:20px;letter-spacing:3px;cursor:pointer;border-radius:var(--radius);transition:background .15s,transform .1s}
#btn-new:hover{background:var(--accent2);transform:translateY(-1px)}
.icon-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);padding:8px 12px;cursor:pointer;border-radius:var(--radius);font-family:var(--font-mono);font-size:11px;letter-spacing:.5px;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}

/* TOOLBAR */
#toolbar{display:flex;align-items:center;gap:8px;padding:10px 28px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}
.filter-btn{font-family:var(--font-mono);font-size:10px;letter-spacing:1px;padding:5px 12px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;border-radius:var(--radius);transition:all .15s;text-transform:uppercase}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.toolbar-sep{width:1px;height:20px;background:var(--border);margin:0 2px}
#search{margin-left:auto;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 12px;font-family:var(--font-mono);font-size:11px;border-radius:var(--radius);width:200px;outline:none;transition:border .15s}
#search:focus{border-color:var(--accent)}
#search::placeholder{color:var(--text-faint)}

/* LIST */
#task-list{padding:20px 28px;display:flex;flex-direction:column;gap:6px;max-width:900px;margin:0 auto}
.task-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:grid;grid-template-columns:28px 6px 1fr auto auto;align-items:center;gap:0;cursor:pointer;transition:border-color .15s,background .15s;position:relative;overflow:hidden;min-height:58px;user-select:none}
.task-item:hover{border-color:var(--border2);background:var(--surface2)}
.task-item.dragging{opacity:.5;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.task-item.drag-over{background:var(--drag-over);border-color:var(--accent)}
.task-item.done-task{opacity:.6}
.task-item.done-task .task-name{text-decoration:line-through;color:var(--text-muted)}
.task-item .stripe{width:6px;align-self:stretch}
.pri-1 .stripe{background:var(--urgent)}
.pri-2 .stripe{background:var(--warning)}
.pri-3 .stripe{background:var(--accent)}
.pri-4 .stripe{background:var(--border2)}
.pri-5 .stripe{background:var(--text-faint)}
.drag-handle{display:flex;align-items:center;justify-content:center;color:var(--text-faint);font-size:14px;height:100%;cursor:grab;padding:0 4px}
.drag-handle:active{cursor:grabbing}
.task-main{padding:10px 14px;display:flex;flex-direction:column;gap:4px;min-width:0}
.task-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.task-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.task-date{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);display:flex;align-items:center;gap:4px}
.task-date.urgent{color:var(--urgent)!important;font-weight:600;animation:pulse 1.5s infinite}
.task-date.warning{color:var(--warning)!important}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.task-tag{font-family:var(--font-mono);font-size:9px;letter-spacing:1px;padding:1px 6px;border-radius:2px;text-transform:uppercase;border:1px solid var(--border);color:var(--text-muted)}
.task-has-note{font-size:10px;color:var(--text-faint)}
.task-actions{display:flex;flex-direction:column;gap:2px;padding:6px 8px;opacity:0;transition:opacity .15s}
.task-item:hover .task-actions{opacity:1}
.task-btn{background:none;border:1px solid var(--border);color:var(--text-muted);width:26px;height:26px;border-radius:var(--radius);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.task-btn:hover{border-color:var(--accent);color:var(--accent)}
.task-btn.del:hover{border-color:var(--urgent);color:var(--urgent)}
.task-btn.check-btn.done{border-color:var(--done);color:var(--done);background:var(--done-bg)}
.task-check-wrap{display:flex;align-items:center;justify-content:center;padding:0 10px}
.pri-badge{font-family:var(--font-mono);font-size:9px;font-weight:600;letter-spacing:1px;padding:1px 5px;border-radius:2px}
.pri-badge.p1{background:rgba(201,64,64,.2);color:var(--urgent)}
.pri-badge.p2{background:rgba(201,125,48,.2);color:var(--warning)}
.pri-badge.p3{background:rgba(212,168,67,.2);color:var(--accent)}
.pri-badge.p4{background:var(--surface3);color:var(--text-muted)}
.pri-badge.p5{background:transparent;color:var(--text-faint);border:1px solid var(--text-faint)}
#empty-state{text-align:center;padding:80px 20px;color:var(--text-faint);font-family:var(--font-mono);display:none}
#empty-state .big{font-family:var(--font-title);font-size:48px;letter-spacing:8px;color:var(--border)}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:var(--modal-bg);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border2);border-radius:4px;max-width:96vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.8);animation:modal-in .2s ease}
@keyframes modal-in{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.modal-header h2{font-family:var(--font-title);font-size:22px;letter-spacing:3px;color:var(--accent);flex:1}
.modal-close{background:none;border:1px solid var(--border);color:var(--text-muted);width:30px;height:30px;border-radius:var(--radius);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-close:hover{border-color:var(--urgent);color:var(--urgent)}
.modal-body{padding:20px 22px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;flex:1}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
#modal{width:680px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field-row.triple{grid-template-columns:1fr 1fr 1fr}
.field-group{display:flex;flex-direction:column;gap:5px}
.field-label{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;color:var(--text-faint);text-transform:uppercase}
.field-input,.field-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;font-family:var(--font-body);font-size:13px;border-radius:var(--radius);outline:none;transition:border .15s;width:100%}
.field-input:focus,.field-select:focus{border-color:var(--accent)}
.field-select option{background:var(--surface2)}
#notes-area{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);min-height:140px;padding:10px 12px;color:var(--text);font-family:var(--font-body);font-size:13px;line-height:1.6;outline:none;cursor:text;overflow-y:auto;transition:border .15s}
#notes-area:focus{border-color:var(--accent)}
#notes-area:empty:before{content:attr(data-placeholder);color:var(--text-faint);pointer-events:none}
#notes-area img{max-width:100%;border-radius:2px;margin:6px 0;display:block;cursor:pointer}
.notes-toolbar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:4px}
.notes-tool{background:var(--surface3);border:1px solid var(--border);color:var(--text-muted);padding:3px 8px;font-size:11px;font-family:var(--font-mono);border-radius:var(--radius);cursor:pointer;transition:all .15s}
.notes-tool:hover{border-color:var(--accent);color:var(--accent)}
.paste-hint{font-family:var(--font-mono);font-size:9px;color:var(--text-faint);letter-spacing:1px;margin-left:auto}
.btn-primary{background:var(--accent);color:var(--bg);border:none;padding:9px 24px;font-family:var(--font-title);font-size:18px;letter-spacing:2px;cursor:pointer;border-radius:var(--radius);transition:background .15s}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:none;color:var(--text-muted);border:1px solid var(--border);padding:9px 20px;font-family:var(--font-mono);font-size:11px;letter-spacing:1px;cursor:pointer;border-radius:var(--radius);transition:all .15s}
.btn-secondary:hover{border-color:var(--text-muted);color:var(--text)}
.btn-danger{background:none;color:var(--urgent);border:1px solid var(--urgent);padding:9px 20px;font-family:var(--font-mono);font-size:11px;cursor:pointer;border-radius:var(--radius);margin-right:auto;transition:all .15s}
.btn-danger:hover{background:var(--urgent);color:#fff}

/* IMPORT */
#import-modal{width:660px}
.import-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px}
.import-tab{font-family:var(--font-mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:8px 18px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.import-tab:hover{color:var(--accent)}
.import-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
#paste-area{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);min-height:160px;padding:12px 14px;color:var(--text);font-family:var(--font-mono);font-size:12px;line-height:1.7;outline:none;resize:vertical;width:100%;transition:border .15s}
#paste-area:focus{border-color:var(--accent)}
#paste-area::placeholder{color:var(--text-faint)}
.import-format-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;font-family:var(--font-mono);font-size:11px;line-height:1.9;color:var(--text-muted);display:flex;flex-direction:column}
.import-format-box .kw{color:var(--accent)}
.import-format-box .line-eg{color:var(--text)}
.import-format-box .comment{color:var(--text-faint)}
.import-drop-zone{border:2px dashed var(--border2);border-radius:4px;padding:28px 20px;text-align:center;font-family:var(--font-mono);font-size:12px;color:var(--text-muted);cursor:pointer;transition:all .2s;position:relative;margin-top:10px}
.import-drop-zone:hover,.import-drop-zone.dragover{border-color:var(--accent);color:var(--accent);background:rgba(212,168,67,.04)}
.import-drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.import-drop-zone .drop-icon{font-size:28px;margin-bottom:8px}
.import-preview-list{display:flex;flex-direction:column;gap:4px;max-height:220px;overflow-y:auto}
.import-preview-item{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:7px 12px;font-size:13px}
.import-preview-item .ip-name{flex:1;font-weight:600}
.import-preview-item .ip-meta{font-family:var(--font-mono);font-size:9px;color:var(--text-faint);display:flex;gap:8px}
.import-preview-item .ip-err{color:var(--urgent);font-family:var(--font-mono);font-size:10px}
.import-preview-item.has-err{border-color:var(--urgent);opacity:.7}
.import-count{color:var(--accent);font-weight:600}
.sec-title{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;color:var(--text-faint);text-transform:uppercase}

/* HELP */
#help-modal{width:620px}
.help-section{display:flex;flex-direction:column;gap:10px}
.help-section h3{font-family:var(--font-title);font-size:18px;letter-spacing:2px;color:var(--accent)}
.shortcut-grid{display:grid;grid-template-columns:auto 1fr;gap:6px 16px;align-items:center}
.shortcut-key{font-family:var(--font-mono);font-size:11px;background:var(--surface3);border:1px solid var(--border2);border-radius:3px;padding:2px 8px;color:var(--text);white-space:nowrap;justify-self:start}
.shortcut-desc{font-size:13px;color:var(--text-muted)}
.help-tip{background:var(--surface2);border-left:3px solid var(--accent);padding:8px 14px;font-size:12px;color:var(--text-muted);line-height:1.6;border-radius:0 var(--radius) var(--radius) 0}
.help-tip strong{color:var(--text)}
.help-sep{height:1px;background:var(--border)}

/* BACKUP */
#backup-modal{width:500px}
.backup-option{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;transition:border-color .15s;text-align:left;width:100%}
.backup-option:hover{border-color:var(--accent)}
.backup-option .bo-icon{font-size:22px;flex-shrink:0;margin-top:2px}
.backup-option .bo-title{font-weight:600;font-size:14px;margin-bottom:3px}
.backup-option .bo-desc{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);line-height:1.5}
.backup-option.danger .bo-title{color:var(--urgent)}
.backup-option.danger:hover{border-color:var(--urgent)}

/* TOAST */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface3);border:1px solid var(--border2);border-radius:4px;padding:10px 20px;font-family:var(--font-mono);font-size:12px;color:var(--text);z-index:9999;transition:transform .3s ease;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.6)}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.success{border-color:var(--done);color:var(--done)}
#toast.error{border-color:var(--urgent);color:var(--urgent)}

/* LIGHTBOX */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:2000;align-items:center;justify-content:center;cursor:zoom-out}
#lightbox.open{display:flex}
#lightbox img{max-width:92vw;max-height:92vh;object-fit:contain}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}

@media(max-width:600px){
  #header{padding:12px 16px}
  #header h1{font-size:26px}
  #task-list{padding:12px 16px}
  #toolbar{padding:8px 16px}
  .field-row,.field-row.triple{grid-template-columns:1fr}
  #modal,#import-modal,#help-modal,#backup-modal{width:98vw}
}
</style>
</head>
<body>

<!-- LANG BAR -->
<div id="lang-bar">
  <button class="lang-btn active" onclick="setLang('ca')">CA</button>
  <button class="lang-btn" onclick="setLang('es')">ES</button>
  <button class="lang-btn" onclick="setLang('en')">EN</button>
</div>

<!-- BANNER -->
<div id="ls-banner">
  <span>💾</span>
  <span id="banner-text"></span>
  <div class="banner-actions">
    <button class="banner-btn" id="banner-export-btn" onclick="exportJSON()"></button>
    <button class="banner-close" onclick="document.getElementById('ls-banner').remove()">✕</button>
  </div>
</div>

<!-- HEADER -->
<div id="header">
  <div>
    <h1 id="app-title"></h1>
    <div class="subtitle" id="app-subtitle"></div>
  </div>
  <div id="stats">
    <span><span class="num" id="stat-total">0</span><span id="stat-total-lbl"></span></span>
    <span><span class="num urgent" id="stat-urgent">0</span><span id="stat-urgent-lbl"></span></span>
    <span><span class="num done-c" id="stat-done">0</span><span id="stat-done-lbl"></span></span>
  </div>
  <div id="header-btns">
    <button class="icon-btn" onclick="openHelpModal()" id="btn-help"></button>
    <button class="icon-btn" onclick="openBackupModal()" id="btn-backup"></button>
    <button class="icon-btn" id="btn-import-txt"></button>
    <input type="file" id="txt-upload" accept=".txt,text/plain" style="display:none">
    <button id="btn-new"></button>
  </div>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <button class="filter-btn active" data-filter="all" id="fb-all"></button>
  <button class="filter-btn" data-filter="pending" id="fb-pending"></button>
  <button class="filter-btn" data-filter="done" id="fb-done"></button>
  <button class="filter-btn" data-filter="urgent" id="fb-urgent"></button>
  <div class="toolbar-sep"></div>
  <button class="filter-btn" data-sort="priority" id="sb-priority"></button>
  <button class="filter-btn" data-sort="date" id="sb-date"></button>
  <button class="filter-btn" data-sort="name" id="sb-name"></button>
  <input type="text" id="search">
</div>

<!-- TASK LIST -->
<div id="task-list"></div>
<div id="empty-state">
  <div class="big" id="empty-big"></div>
  <div style="margin-top:12px;font-size:12px" id="empty-sub"></div>
</div>

<!-- MODAL TASCA -->
<div id="modal-overlay" class="modal-overlay">
  <div id="modal" class="modal-box">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button class="modal-close" id="modal-close-btn">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label class="field-label" id="lbl-name"></label>
        <input type="text" id="f-name" class="field-input">
      </div>
      <div class="field-row triple">
        <div class="field-group">
          <label class="field-label" id="lbl-priority"></label>
          <select id="f-priority" class="field-select">
            <option value="1"></option>
            <option value="2"></option>
            <option value="3" selected></option>
            <option value="4"></option>

// DATA
// ═══════════════════════════════════════════════════════════════
const STORE_KEY = 'tasques_v2';
function load() { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch { return []; } }
function save(t) { localStorage.setItem(STORE_KEY, JSON.stringify(t)); }

let tasks = load();
let editId = null;
let currentFilter = 'all';
let currentSort = 'priority';
let searchQuery = '';

// ─── DATES ────────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().slice(0,10); }
function daysLeft(d) {
  if (!d) return null;
  return Math.round((new Date(d+'T00:00:00') - new Date(todayStr()+'T00:00:00')) / 86400000);
}
function dateUrgency(d, status) {
  if (!d || status === 'feta') return 'normal';
  const n = daysLeft(d);
  if (n < 0) return 'overdue';
  if (n <= 1) return 'urgent';
  if (n <= 3) return 'warning';
  return 'normal';
}
function formatDate(d) {
  if (!d) return '';
  const [y,m,dd] = d.split('-');
  return `${dd}/${m}/${y}`;
}
function urgLabel(d, status) {
  const t = L();
  if (!d || status === 'feta') return '';
  const n = daysLeft(d);
  if (n < 0) return ` ${t.urgOverdueFn(Math.abs(n))}`;
  if (n === 0) return ` ${t.urgToday}`;
  if (n === 1) return ` ${t.urgTomorrow}`;
  return ` ${t.urgLeftFn(n)}`;
}

// ─── RENDER ───────────────────────────────────────────────────
function getFiltered() {
  let list = [...tasks];
  if (currentFilter === 'pending') list = list.filter(t => t.status !== 'feta');
  if (currentFilter === 'done')    list = list.filter(t => t.status === 'feta');
  if (currentFilter === 'urgent')  list = list.filter(t => { const u = dateUrgency(t.date,t.status); return u==='urgent'||u==='overdue'; });
  if (searchQuery.trim()) {
    const q = searchQuery.toLowerCase();
    list = list.filter(t => t.name.toLowerCase().includes(q)||(t.tag||'').toLowerCase().includes(q)||(t.notes||'').toLowerCase().includes(q));
  }
  if (currentSort === 'priority') list.sort((a,b) => a.priority-b.priority || a.order-b.order);
  else if (currentSort === 'date') list.sort((a,b) => { if(!a.date&&!b.date)return 0; if(!a.date)return 1; if(!b.date)return -1; return a.date.localeCompare(b.date); });
  else if (currentSort === 'name') list.sort((a,b) => a.name.localeCompare(b.name));
  return list;
}

function renderAll() {
  const t = L();
  const list = getFiltered();
  const container = document.getElementById('task-list');
  container.innerHTML = '';
  const empty = document.getElementById('empty-state');
  if (list.length === 0) { empty.style.display = 'block'; }
  else { empty.style.display = 'none'; list.forEach(tk => container.appendChild(buildItem(tk))); }
  document.getElementById('stat-total').textContent   = tasks.length;
  document.getElementById('stat-done').textContent    = tasks.filter(tk => tk.status === 'feta').length;
  document.getElementById('stat-urgent').textContent  = tasks.filter(tk => { const u = dateUrgency(tk.date,tk.status); return u==='urgent'||u==='overdue'; }).length;
}

function buildItem(tk) {
  const t = L();
  const urg = dateUrgency(tk.date, tk.status);
  const div = document.createElement('div');
  div.className = `task-item pri-${tk.priority}${tk.status==='feta'?' done-task':''}`;
  div.dataset.id = tk.id;
  div.draggable = true;

  let dateHtml = '';
  if (tk.date) {
    const cls = urg==='urgent'||urg==='overdue' ? 'urgent' : urg==='warning' ? 'warning' : '';
    const icon = urg==='overdue' ? '⚠' : urg==='urgent' ? '🔴' : '📅';
    dateHtml = `<span class="task-date ${cls}">${icon} ${formatDate(tk.date)}${urgLabel(tk.date,tk.status)}</span>`;
  }
  const tagHtml  = tk.tag ? `<span class="task-tag">${esc(tk.tag)}</span>` : '';
  const hasText  = tk.notes && tk.notes.replace(/<[^>]*>/g,'').trim();
  const hasImgs  = tk.images && tk.images.length > 0;
  const noteHtml = (hasText||hasImgs) ? `<span class="task-has-note">✎${hasImgs ? ` +${tk.images.length}img` : ''}</span>` : '';
  const ps = t.priShort[tk.priority];
  const pn = t.priName[tk.priority];

  div.innerHTML = `
    <div class="drag-handle" title="drag">⠿</div>
    <div class="stripe"></div>
    <div class="task-main" onclick="openEdit('${tk.id}')">
      <div class="task-name">${esc(tk.name)}</div>
      <div class="task-meta">
        <span class="pri-badge p${tk.priority}">${ps} ${pn}</span>
        ${dateHtml}${tagHtml}${noteHtml}
      </div>
    </div>
    <div class="task-check-wrap">
      <button class="task-btn check-btn${tk.status==='feta'?' done':''}"
        title="${tk.status==='feta' ? t.markPending : t.markDone}"
        onclick="toggleDone('${tk.id}',event)">${tk.status==='feta'?'✓':'○'}</button>
    </div>
    <div class="task-actions">
      <button class="task-btn" title="Edit" onclick="openEdit('${tk.id}',event)">✎</button>
      <button class="task-btn del" title="Delete" onclick="deleteTask('${tk.id}',event)">🗑</button>
    </div>`;

  div.addEventListener('dragstart', onDragStart);
  div.addEventListener('dragover',  onDragOver);
  div.addEventListener('dragleave', onDragLeave);
  div.addEventListener('drop',      onDrop);
  div.addEventListener('dragend',   onDragEnd);
  return div;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── DRAG ────────────────────────────────────────────────────
let dragId = null;
function onDragStart(e) { dragId = e.currentTarget.dataset.id; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
function onDragOver(e)  { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  if (!dragId || dragId === e.currentTarget.dataset.id) return;
  const from = tasks.findIndex(t => t.id === dragId);
  const to   = tasks.findIndex(t => t.id === e.currentTarget.dataset.id);
  if (from < 0 || to < 0) return;
  tasks.splice(to, 0, tasks.splice(from, 1)[0]);
  tasks.forEach((t,i) => t.order = i);
  save(tasks); renderAll();
}
function onDragEnd(e) { e.currentTarget.classList.remove('dragging'); dragId = null; }

// ─── TOGGLE / DELETE ─────────────────────────────────────────
function toggleDone(id, e) {
  e && e.stopPropagation();
  const tk = tasks.find(t => t.id === id); if (!tk) return;
  tk.status = tk.status === 'feta' ? 'pendent' : 'feta';
  save(tasks); renderAll();
}
function deleteTask(id, e) {
  e && e.stopPropagation();
  if (!confirm(L().confirmDelete)) return;
  tasks = tasks.filter(t => t.id !== id);
  save(tasks); renderAll();
}

// ─── TASK MODAL ──────────────────────────────────────────────
const overlay   = document.getElementById('modal-overlay');
const notesArea = document.getElementById('notes-area');
let modalImages = [];

function openNew() {
  editId = null;
  document.getElementById('modal-title').textContent = L().modalNew;
  document.getElementById('f-name').value = '';
  document.getElementById('f-tag').value = '';
  document.getElementById('f-priority').value = '3';
  document.getElementById('f-date').value = '';
  document.getElementById('f-status').value = 'pendent';
  notesArea.innerHTML = ''; modalImages = [];
  document.getElementById('btn-delete').style.display = 'none';
  overlay.classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 100);
}
function openEdit(id, e) {
  e && e.stopPropagation();
  const tk = tasks.find(t => t.id === id); if (!tk) return;
  editId = id;
  document.getElementById('modal-title').textContent = L().modalEdit;
  document.getElementById('f-name').value = tk.name;
  document.getElementById('f-priority').value = tk.priority;
  document.getElementById('f-date').value = tk.date || '';
  document.getElementById('f-status').value = tk.status;
  document.getElementById('f-tag').value = tk.tag || '';
  notesArea.innerHTML = tk.notes || '';
  modalImages = tk.images ? [...tk.images] : [];
  document.getElementById('btn-delete').style.display = 'block';
  overlay.classList.add('open');
}
function closeModal() { overlay.classList.remove('open'); editId = null; }
function saveModal() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) {
    const fi = document.getElementById('f-name');
    fi.focus(); fi.style.borderColor = 'var(--urgent)';
    setTimeout(() => fi.style.borderColor = '', 1200);
    return;
  }
  const data = {
    id: editId || uid(), name,
    priority: parseInt(document.getElementById('f-priority').value),
    date: document.getElementById('f-date').value || null,
    status: document.getElementById('f-status').value,
    tag: document.getElementById('f-tag').value.trim(),
    notes: notesArea.innerHTML,
    images: [...modalImages],
    order: editId ? tasks.find(t => t.id === editId).order : tasks.length,
  };
  if (editId) tasks[tasks.findIndex(t => t.id === editId)] = data;
  else tasks.push(data);
  save(tasks); renderAll(); closeModal();
}
function deleteFromModal() {
  if (!editId || !confirm(L().confirmDelete)) return;
  tasks = tasks.filter(t => t.id !== editId);
  save(tasks); renderAll(); closeModal();
}

// ─── IMAGES ──────────────────────────────────────────────────
document.getElementById('img-upload').addEventListener('change', function(e) {
  Array.from(e.target.files).forEach(f => readImg(f, insertImg));
  this.value = '';
});
function readImg(file, cb) { const r = new FileReader(); r.onload = ev => cb(ev.target.result); r.readAsDataURL(file); }
function insertImg(src) {
  notesArea.focus();
  const img = document.createElement('img'); img.src = src; img.onclick = () => openLightbox(src);
  const sel = window.getSelection();
  if (sel.rangeCount) {
    const r = sel.getRangeAt(0); r.collapse(false); r.insertNode(img);
    r.setStartAfter(img); r.collapse(true); sel.removeAllRanges(); sel.addRange(r);
  } else notesArea.appendChild(img);
  modalImages.push(src);
}
notesArea.addEventListener('paste', function(e) {
  const items = e.clipboardData && e.clipboardData.items; if (!items) return;
  for (let it of items) { if (it.type.startsWith('image/')) { e.preventDefault(); readImg(it.getAsFile(), insertImg); return; } }
});
function formatDoc(cmd) { notesArea.focus(); document.execCommand(cmd, false, null); }
function insertBullet() { notesArea.focus(); document.execCommand('insertHTML', false, '<br>• '); }

// ─── LIGHTBOX ─────────────────────────────────────────────────
function openLightbox(src) { document.getElementById('lb-img').src = src; document.getElementById('lightbox').classList.add('open'); }
document.getElementById('lightbox').addEventListener('click', function() { this.classList.remove('open'); });

// ─── IMPORT TXT ──────────────────────────────────────────────
let pendingImport = [];
let currentImportTab = 'file';

function openImportModal() {
  importGoBack();
  document.getElementById('import-overlay').classList.add('open');
}
function closeImportModal() {
  document.getElementById('import-overlay').classList.remove('open');
  document.getElementById('paste-area').value = '';
  pendingImport = [];
  importGoBack();
}
function importGoBack() {
  document.getElementById('import-step1').style.display = 'block';
  document.getElementById('import-step2').style.display = 'none';
  document.getElementById('btn-confirm-import').style.display = 'none';
  document.getElementById('btn-import-back').style.display = 'none';
  pendingImport = [];
  switchImportTab(currentImportTab);
}

document.getElementById('btn-import-txt').addEventListener('click', openImportModal);
document.getElementById('txt-upload').addEventListener('change', function(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader(); r.onload = ev => { parseTxtAndPreview(ev.target.result); this.value = ''; }; r.readAsText(f, 'UTF-8');
});

const dropZone = document.getElementById('import-drop');
dropZone.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); e.stopPropagation(); dropZone.classList.remove('dragover');
  const f = [...e.dataTransfer.files].find(f => f.name.endsWith('.txt') || f.type === 'text/plain');
  if (!f) return;
  const r = new FileReader(); r.onload = ev => parseTxtAndPreview(ev.target.result); r.readAsText(f, 'UTF-8');
});
document.getElementById('txt-drop-input').addEventListener('change', function(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader(); r.onload = ev => { parseTxtAndPreview(ev.target.result); this.value = ''; }; r.readAsText(f, 'UTF-8');
});

document.addEventListener('dragover', e => { if ([...e.dataTransfer.types].includes('Files')) e.preventDefault(); });
document.addEventListener('drop', e => {
  const f = [...e.dataTransfer.files].find(f => f.name.endsWith('.txt') || f.type === 'text/plain');
  if (!f) return; e.preventDefault();
  const r = new FileReader(); r.onload = ev => { parseTxtAndPreview(ev.target.result); openImportModal(); }; r.readAsText(f, 'UTF-8');
});

function switchImportTab(tab) {
  currentImportTab = tab;
  document.getElementById('tab-file').classList.toggle('active', tab === 'file');
  document.getElementById('tab-paste').classList.toggle('active', tab === 'paste');
  document.getElementById('import-tab-file').style.display  = tab === 'file'  ? 'block' : 'none';
  document.getElementById('import-tab-paste').style.display = tab === 'paste' ? 'block' : 'none';
}

function previewPastedText() {
  const text = document.getElementById('paste-area').value.trim();
  if (!text) { showToast(L().impNoText, 'error'); return; }
  parseTxtAndPreview(text);
}

document.addEventListener('paste', function(e) {
  const ov = document.getElementById('import-overlay');
  if (!ov.classList.contains('open')) return;
  if (currentImportTab !== 'paste') return;
  const active = document.activeElement;
  if (active && (active.tagName === 'TEXTAREA' || active.tagName === 'INPUT')) return;
  const text = e.clipboardData.getData('text/plain');
  if (text) { const ta = document.getElementById('paste-area'); ta.value += text; ta.focus(); e.preventDefault(); }
});

function parseTxt(text) {
  const PM = {
    'critica':1,'crítica':1,'critical':1,'1':1,
    'alta':2,'high':2,'2':2,
    'normal':3,'3':3,'':3,
    'baixa':4,'baja':4,'low':4,'4':4,
    'minima':5,'mínima':5,'minimal':5,'5':5
  };
  return text.split('\n').map(raw => {
    const line = raw.trim();
    if (!line || line.startsWith('#')) return null;
    const parts = line.split('|').map(p => p.trim());
    const name = parts[0]; if (!name) return null;
    const priRaw = (parts[1] || '').toLowerCase().trim();
    const priority = PM[priRaw] !== undefined ? PM[priRaw] : 3;
    let date = null, error = null;
    const dr = (parts[2] || '').trim();
    if (dr) {
      const dmy = dr.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      const ymd = dr.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (dmy)      date = `${dmy[3]}-${dmy[2].padStart(2,'0')}-${dmy[1].padStart(2,'0')}`;
      else if (ymd) date = dr;
      else          error = L().impDateErr(dr);
    }
    return { name, priority, date, tag: (parts[3] || '').trim(), error };
  }).filter(Boolean);
}

function parseTxtAndPreview(text) {
  const t = L();
  const parsed = parseTxt(text);
  pendingImport = parsed.filter(p => !p.error);
  const total = parsed.length, valid = pendingImport.length, errs = parsed.filter(p => p.error).length;
  const PC = ['','var(--urgent)','var(--warning)','var(--accent)','var(--border2)','var(--text-faint)'];
  let listHtml = '';
  parsed.forEach(p => {
    listHtml += `<div class="import-preview-item${p.error?' has-err':''}">
      <div class="ip-name">${esc(p.name)}</div>
      <div class="ip-meta">
        <span style="color:${PC[p.priority]}">P${p.priority}</span>
        ${p.date  ? `<span>${formatDate(p.date)}</span>` : ''}
        ${p.tag   ? `<span>${esc(p.tag)}</span>` : ''}
      </div>
      ${p.error ? `<div class="ip-err">⚠ ${esc(p.error)}</div>` : ''}
    </div>`;
  });
  document.getElementById('import-summary').innerHTML = t.impFoundFn(total, valid, errs);
  document.getElementById('import-preview-list').innerHTML = listHtml ||
    `<div style="font-family:var(--font-mono);font-size:12px;color:var(--text-faint);text-align:center;padding:20px">${t.impNoneFound}</div>`;
  document.getElementById('import-step1').style.display = 'none';
  document.getElementById('import-step2').style.display = 'flex';
  document.getElementById('btn-confirm-import').style.display = valid > 0 ? 'block' : 'none';
  document.getElementById('btn-import-back').style.display = 'block';
}

document.getElementById('btn-confirm-import').addEventListener('click', function() {
  if (!pendingImport.length) return;
  const start = tasks.length;
  pendingImport.forEach((p,i) => tasks.push({
    id: uid(), name: p.name, priority: p.priority, date: p.date,
    status: 'pendent', tag: p.tag, notes: '', images: [], order: start + i
  }));
  save(tasks); renderAll(); closeImportModal();
  showToast(L().impImportedFn(pendingImport.length), 'success');
});

// ─── HELP ────────────────────────────────────────────────────
function openHelpModal()  { document.getElementById('help-overlay').classList.add('open'); }
function closeHelpModal() { document.getElementById('help-overlay').classList.remove('open'); }

// ─── BACKUP ──────────────────────────────────────────────────
function openBackupModal()  { document.getElementById('backup-overlay').classList.add('open'); }
function closeBackupModal() { document.getElementById('backup-overlay').classList.remove('open'); }

function exportJSON() {
  const blob = new Blob([JSON.stringify(tasks, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `tasques-copia-${todayStr()}.json`; a.click(); URL.revokeObjectURL(a.href);
  showToast(L().exportMsg, 'success');
}
document.getElementById('import-json-input').addEventListener('change', function(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader(); r.onload = ev => {
    try {
      const imp = JSON.parse(ev.target.result);
      if (!Array.isArray(imp)) throw 0;
      if (!confirm(L().confirmRestoreFn(imp.length))) return;
      tasks = imp; save(tasks); renderAll(); closeBackupModal();
      showToast(L().restoredFn(imp.length), 'success');
    } catch { showToast(L().invalidFile, 'error'); }
  }; r.readAsText(f); this.value = '';
});
function confirmClearAll() {
  if (!confirm(L().confirmClear)) return;
  tasks = []; save(tasks); renderAll(); closeBackupModal();
  showToast(L().clearedMsg, 'error');
}

// ─── TOAST ───────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = type ? `show ${type}` : 'show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = el.className.replace('show','').trim(); }, 3200);
}

// ─── FILTERS / SORT ──────────────────────────────────────────
document.querySelectorAll('[data-filter]').forEach(btn => btn.addEventListener('click', function() {
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
  this.classList.add('active'); currentFilter = this.dataset.filter; renderAll();
}));
document.querySelectorAll('[data-sort]').forEach(btn => btn.addEventListener('click', function() {
  document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('active'));
  this.classList.add('active'); currentSort = this.dataset.sort; renderAll();
}));
document.getElementById('search').addEventListener('input', function() { searchQuery = this.value; renderAll(); });

// ─── BUTTON EVENTS ───────────────────────────────────────────
document.getElementById('btn-new').addEventListener('click', openNew);
document.getElementById('btn-save').addEventListener('click', saveModal);
document.getElementById('btn-cancel').addEventListener('click', closeModal);
document.getElementById('modal-close-btn').addEventListener('click', closeModal);
document.getElementById('btn-delete').addEventListener('click', deleteFromModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.getElementById('import-overlay').addEventListener('click', e => { if (e.target.id === 'import-overlay') closeImportModal(); });
document.getElementById('help-overlay').addEventListener('click', e => { if (e.target.id === 'help-overlay') closeHelpModal(); });
document.getElementById('backup-overlay').addEventListener('click', e => { if (e.target.id === 'backup-overlay') closeBackupModal(); });

document.addEventListener('keydown', function(e) {
  const anyOpen = document.querySelector('.modal-overlay.open');
  if (e.key === 'Escape') {
    if (overlay.classList.contains('open')) closeModal();
    else if (document.getElementById('import-overlay').classList.contains('open')) closeImportModal();
    else if (document.getElementById('help-overlay').classList.contains('open')) closeHelpModal();
    else if (document.getElementById('backup-overlay').classList.contains('open')) closeBackupModal();
  }
  if (e.key === 'Enter' && e.ctrlKey && overlay.classList.contains('open')) saveModal();
  const active = document.activeElement;
  const typing = active.tagName==='INPUT' || active.tagName==='TEXTAREA' || active.contentEditable==='true';
  if (!anyOpen && !typing) {
    if (e.key === 'n' || e.key === 'N') openNew();
    if (e.key === '?') openHelpModal();
  }
});

// ─── UTILS ───────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ─── INIT ─────────────────────────────────────────────────────
document.querySelector('[data-sort="priority"]').classList.add('active');
applyI18N();
renderAll();
</script>
